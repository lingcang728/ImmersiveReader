<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>正在连接到 Zhihu Packer...</title>
    <style>
        body {
            background-color: #080710;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .loader { text-align: center; }
        a { color: #00f2fe; text-decoration: none; font-weight: bold; }
        .status { color: rgba(255, 255, 255, 0.6); margin-top: 8px; }
    </style>
</head>
<body>
    <div class="loader">
        <h2 style="font-weight: 300; letter-spacing: 1px;">正在进入 Web 控制中心...</h2>
        <p class="status" id="status">正在检测本地服务 (http://localhost:3000) 是否就绪…</p>
        <p class="status">若长时间未跳转，请先运行「1. 双击启动控制中心.bat」，或 <a href="http://localhost:3000">点击此处直接访问</a>。</p>
    </div>
    <script>
        const TARGET = 'http://localhost:3000';
        const statusEl = document.getElementById('status');
        let attempts = 0;

        async function probeAndGo() {
            attempts++;
            try {
                // no-cors 仅用于探测端口是否可达：可达则跳转，连接被拒会抛错进入重试
                await fetch(TARGET + '/', { mode: 'no-cors', cache: 'no-store' });
                statusEl.textContent = '服务已就绪，正在跳转…';
                window.location.href = TARGET;
            } catch (e) {
                statusEl.textContent = '本地服务尚未启动，正在等待…（已尝试 ' + attempts + ' 次）';
                setTimeout(probeAndGo, 1000);
            }
        }

        probeAndGo();
    </script>
</body>
</html>
